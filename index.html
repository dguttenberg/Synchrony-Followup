<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sports Change Lives — Synchrony × Dick's Sporting Goods</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #ffffff;
    --paper-2: #faf7f0;
    --paper-3: #f3eee0;
    --ink: #161616;
    --ink-2: #2a2a2a;
    --ink-3: #4a4a4a;
    --gold: #f4c220;
    --gold-deep: #c89200;
    --gold-soft: #fdf2c8;
    --rule: rgba(22,22,22,0.10);
    --rule-strong: rgba(22,22,22,0.16);
    --serif: 'Fraunces', 'Times New Roman', serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper-2);
    font-size: 17px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .gold-rail-top { height: 8px; background: var(--gold); width: 100%; }

  .shell {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 48px 24px;
  }

  .card {
    width: 100%;
    max-width: 460px;
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 56px 48px;
    position: relative;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 48px;
    height: 4px;
    background: var(--gold);
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 20px;
  }

  h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 34px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold-deep);
  }

  .sub {
    font-size: 14px;
    color: var(--ink-3);
    margin-bottom: 36px;
  }

  form { display: flex; flex-direction: column; gap: 14px; }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  input[type="password"] {
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
    background: var(--paper-2);
    border: 1px solid var(--rule-strong);
    padding: 14px 16px;
    width: 100%;
    outline: none;
    transition: border-color 120ms ease, background 120ms ease;
  }
  input[type="password"]:focus {
    border-color: var(--gold-deep);
    background: var(--paper);
  }

  button {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--gold);
    border: none;
    padding: 15px 20px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 120ms ease;
  }
  button:hover { background: var(--gold-deep); color: var(--paper); }
  button:disabled { opacity: 0.6; cursor: wait; }

  .error {
    font-size: 13px;
    color: #a63232;
    min-height: 18px;
    margin-top: 4px;
  }

  footer {
    padding: 20px 24px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
    text-align: center;
    border-top: 1px solid var(--rule);
    background: var(--paper);
  }

  @media (max-width: 520px) {
    .card { padding: 40px 28px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
  <div class="gold-rail-top"></div>
  <main class="shell">
    <section class="card">
      <div class="eyebrow">Synchrony × Dick's Sporting Goods</div>
      <h1>Sports <em>Change Lives</em></h1>
      <p class="sub">This presentation is private. Enter the access code to continue.</p>
      <form id="gate">
        <label for="pw">Access code</label>
        <input id="pw" type="password" autocomplete="off" autofocus required />
        <button type="submit" id="btn">Enter</button>
        <div class="error" id="err" role="alert" aria-live="polite"></div>
      </form>
    </section>
  </main>
  <footer>Doner — Confidential</footer>

<script>
  const EXPECTED = "2a20517de7020a603093a789d8bcbb84dbc334faeb45750cfcb06d0359b9c8e2";

  async function sha256(str) {
    const buf = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest("SHA-256", buf);
    return Array.from(new Uint8Array(hash))
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  const form = document.getElementById("gate");
  const input = document.getElementById("pw");
  const err = document.getElementById("err");
  const btn = document.getElementById("btn");

  if (sessionStorage.getItem("scl_auth") === "ok") {
    window.location.replace("/pitch.html");
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    err.textContent = "";
    btn.disabled = true;
    const hashed = await sha256(input.value);
    if (hashed === EXPECTED) {
      sessionStorage.setItem("scl_auth", "ok");
      window.location.replace("/pitch.html");
    } else {
      err.textContent = "Incorrect code. Please try again.";
      input.value = "";
      input.focus();
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
